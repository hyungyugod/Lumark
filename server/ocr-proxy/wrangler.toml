name = "lumark-ocr-proxy"
main = "src/index.js"
compatibility_date = "2026-05-01"

# 전체 일일 backstop(안전망) — 계정 크레딧과 별개로 폭주 상한. 0이면 비활성.
[vars]
MODEL = "gemini-2.5-flash-lite"
GLOBAL_DAILY = "1500"
# 동작별 크레딧 비용.
COST_OCR = "1"
COST_QUIZ = "2"
# AI Gateway 경유 (Worker→Gemini 지역 차단 회피). 대시보드에서 게이트웨이 생성 후 채움.
# CF_ACCOUNT_ID: `npx wrangler whoami` 의 Account ID. CF_GATEWAY: 만든 게이트웨이 이름.
CF_ACCOUNT_ID = "fb8d5badc96f29c766dbc8eb0e10b512"
CF_GATEWAY = "lumark"
# Supabase 연결 (URL·publishable 키는 공개라 vars에 둬도 안전).
SUPABASE_URL = "https://cjcpbnmjytglultpogeq.supabase.co"
SUPABASE_ANON_KEY = "sb_publishable_i2hNg0RqQca5SjbZ6VCnKQ_eRXLn9oy"

# 일일 카운터 저장용 KV. 아래 id는 `wrangler kv namespace create RATE` 후 채움.
[[kv_namespaces]]
binding = "RATE"
id = "6be1029749204cb69c2f34631b47cf6c"

# secret 등록 (값은 채팅/코드에 두지 말 것):
#   npx wrangler secret put GEMINI_KEY       # Gemini API 키
#   npx wrangler secret put SUPABASE_SECRET  # Supabase secret 키(sb_secret_...) — RPC service_role
#
# (선택) APP_TOKEN: 보조 게이트. 설정하면 X-App-Token 헤더가 이 값과 같아야 통과.
#   npx wrangler secret put APP_TOKEN
