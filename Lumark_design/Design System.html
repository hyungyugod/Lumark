<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lumark · Design System v0.1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Nanum+Myeongjo:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* —— Light tokens (default) —— */
    --brown:    oklch(0.43 0.060 58);
    --brown-2:  oklch(0.37 0.055 55);
    --cream:    oklch(0.962 0.018 82);
    --surface:  oklch(0.985 0.010 82);
    --surface-2:oklch(0.945 0.020 82);
    --ink:      oklch(0.255 0.026 50);
    --ink-2:    oklch(0.34 0.022 50);
    --subtle:   oklch(0.555 0.018 52);
    --muted:    oklch(0.72 0.015 60);
    --divider:  oklch(0.895 0.014 70);
    --hairline: oklch(0.84 0.014 65);
    --brass:    oklch(0.68 0.10 75);

    /* Highlighter colors — shared across modes, with bg variants per mode */
    --hl-yellow:        oklch(0.78 0.180 88);
    --hl-yellow-bg:     oklch(0.955 0.085 92);
    --hl-yellow-edge:   oklch(0.84 0.140 90);
    --hl-orange:        oklch(0.72 0.180 50);
    --hl-orange-bg:     oklch(0.935 0.075 60);
    --hl-orange-edge:   oklch(0.80 0.140 55);
    --hl-pink:          oklch(0.72 0.175 0);
    --hl-pink-bg:       oklch(0.935 0.060 0);
    --hl-pink-edge:     oklch(0.82 0.115 0);
    --hl-blue:          oklch(0.70 0.130 235);
    --hl-blue-bg:       oklch(0.935 0.045 235);
    --hl-blue-edge:     oklch(0.81 0.085 235);

    /* Tunable via Tweaks */
    --r-sm: 6px;
    --r-md: 12px;
    --r-lg: 20px;
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-5: 24px;
    --sp-6: 32px;
    --sp-7: 48px;

    --shadow-1: 0 1px 2px rgba(40,28,16,.04), 0 6px 18px -10px rgba(40,28,16,.10);

    --font-body: 'Noto Sans KR', system-ui, -apple-system, sans-serif;
    --font-display: 'Nanum Myeongjo', 'Noto Serif KR', serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

    color-scheme: light;
  }

  html[data-theme="dark"] {
    --brown:    oklch(0.74 0.075 62);
    --brown-2:  oklch(0.66 0.072 60);
    --cream:    oklch(0.175 0.014 55);
    --surface:  oklch(0.215 0.014 56);
    --surface-2:oklch(0.255 0.016 56);
    --ink:      oklch(0.925 0.014 80);
    --ink-2:    oklch(0.84 0.018 75);
    --subtle:   oklch(0.66 0.015 60);
    --muted:    oklch(0.50 0.013 60);
    --divider:  oklch(0.28 0.013 55);
    --hairline: oklch(0.34 0.014 55);
    --brass:    oklch(0.78 0.09 78);

    --hl-yellow-bg:     oklch(0.36 0.090 88);
    --hl-yellow-edge:   oklch(0.52 0.130 88);
    --hl-orange-bg:     oklch(0.36 0.095 50);
    --hl-orange-edge:   oklch(0.52 0.135 50);
    --hl-pink-bg:       oklch(0.36 0.095 0);
    --hl-pink-edge:     oklch(0.52 0.130 0);
    --hl-blue-bg:       oklch(0.34 0.075 235);
    --hl-blue-edge:     oklch(0.50 0.110 235);

    --shadow-1: 0 1px 2px rgba(0,0,0,.32), 0 8px 22px -10px rgba(0,0,0,.50);

    color-scheme: dark;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  /* —— Shell layout —— */
  .shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
  @media (max-width: 880px) { .shell { grid-template-columns: 1fr; } }

  .sidebar {
    position: sticky; top: 0; align-self: start;
    height: 100vh; overflow: auto;
    padding: 32px 20px 32px 28px;
    border-right: 1px solid var(--divider);
    background: var(--surface-2);
  }
  @media (max-width: 880px) {
    .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--divider); padding: 20px 24px; }
  }

  .brand {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: flex; align-items: baseline; gap: 8px;
  }
  .brand .ver { font-family: var(--font-body); font-size: 11px; font-weight: 500; color: var(--subtle); letter-spacing: 0.04em; }

  .brand-sub { font-size: 12.5px; color: var(--subtle); margin-top: 6px; line-height: 1.55; }

  .navlist { margin-top: 28px; display: flex; flex-direction: column; gap: 2px; }
  .navlist a {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: var(--r-sm);
    color: var(--ink-2); text-decoration: none; font-size: 13.5px;
    font-weight: 500;
  }
  .navlist a:hover { background: rgba(0,0,0,0.04); }
  html[data-theme="dark"] .navlist a:hover { background: rgba(255,255,255,0.05); }
  .navlist a .num { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); width: 18px; }
  .navlist .group-label {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); padding: 18px 10px 4px;
  }

  .content { padding: 48px 56px 96px; max-width: 1100px; }
  @media (max-width: 880px) { .content { padding: 32px 24px 80px; } }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .topbar h1 { margin: 0; }

  .mode-toggle {
    display: inline-flex; align-items: center; gap: 0;
    background: var(--surface); border: 1px solid var(--divider);
    border-radius: 999px; padding: 3px;
  }
  .mode-toggle button {
    appearance: none; border: 0; background: transparent;
    font: inherit; font-size: 12.5px; font-weight: 500; color: var(--subtle);
    padding: 6px 14px; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .mode-toggle button.on { background: var(--ink); color: var(--cream); }

  /* —— Typography helpers —— */
  .display { font-family: var(--font-display); font-weight: 800; font-size: 44px; line-height: 1.15; letter-spacing: -0.02em; color: var(--ink); }
  .h1 { font-family: var(--font-display); font-weight: 800; font-size: 30px; line-height: 1.2; letter-spacing: -0.015em; color: var(--ink); margin: 0; }
  .h2 { font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 1.25; letter-spacing: -0.01em; color: var(--ink); margin: 0; }
  .lede { font-family: var(--font-body); font-size: 17px; line-height: 1.6; color: var(--ink-2); }
  .body { font-family: var(--font-body); font-size: 15px; line-height: 1.65; color: var(--ink-2); }
  .caption { font-family: var(--font-body); font-size: 12px; line-height: 1.5; color: var(--subtle); letter-spacing: 0.02em; }
  .mono { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-2); }
  .eyebrow { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brass); }

  /* —— Section frame —— */
  section.s { margin-top: 64px; scroll-margin-top: 24px; }
  section.s:first-of-type { margin-top: 0; }
  .s-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px; }
  .s-head .num {
    font-family: var(--font-mono); font-size: 12px; color: var(--brass);
    border: 1px solid var(--brass); padding: 2px 8px; border-radius: 999px;
    background: color-mix(in oklab, var(--brass) 8%, transparent);
  }
  .s-desc { color: var(--subtle); max-width: 640px; margin: 6px 0 24px; }

  /* —— Tile system —— */
  .tiles { display: grid; gap: 14px; }
  .tile {
    background: var(--surface); border: 1px solid var(--divider);
    border-radius: var(--r-md); padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .tile .swatch { height: 88px; border-radius: var(--r-sm); border: 1px solid var(--hairline); }
  .tile .label { font-weight: 600; font-size: 14px; color: var(--ink); }
  .tile .meta { display: flex; justify-content: space-between; align-items: center; }
  .tile .vals { display: flex; flex-direction: column; gap: 2px; }
  .tile .var { font-family: var(--font-mono); font-size: 11px; color: var(--subtle); }
  .tile .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  /* —— Buttons —— */
  .btn {
    appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 18px; border-radius: var(--r-sm);
    font-size: 14.5px; letter-spacing: -0.005em;
    transition: transform .08s ease, background .12s ease, border-color .12s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--brown); color: var(--cream); }
  .btn-primary:hover { background: var(--brown-2); }
  .btn-secondary { background: var(--surface-2); color: var(--ink); border: 1px solid var(--hairline); }
  .btn-secondary:hover { background: color-mix(in oklab, var(--surface-2) 70%, var(--ink) 6%); }
  .btn-ghost { background: transparent; color: var(--ink-2); }
  .btn-ghost:hover { background: rgba(0,0,0,.04); }
  html[data-theme="dark"] .btn-ghost:hover { background: rgba(255,255,255,.05); }

  /* —— Chip (4-color highlighter) —— */
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 13px 7px 11px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    border: 1px solid transparent; background: transparent;
    color: var(--subtle); cursor: pointer;
  }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--c, var(--muted)); opacity: .55; }
  .chip.on { color: var(--ink); background: var(--c-bg); border-color: var(--c-edge); }
  .chip.on .dot { opacity: 1; box-shadow: 0 0 0 2px color-mix(in oklab, var(--c) 30%, transparent); }

  /* —— Recent card —— */
  .recent-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border-radius: var(--r-md); background: var(--surface); border: 1px solid var(--divider);
  }
  .recent-card .thumb {
    width: 42px; height: 54px; border-radius: 4px;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--hairline);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; color: var(--subtle);
  }
  .recent-card .title { font-weight: 600; color: var(--ink); font-size: 14.5px; }
  .recent-card .date { font-size: 11.5px; color: var(--subtle); margin-top: 1px; }
  .recent-card .dots { margin-top: 6px; display: inline-flex; gap: 4px; }
  .recent-card .dots i { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .chev { color: var(--muted); }

  /* —— Tab toggle (underline style) —— */
  .tabs { display: inline-flex; gap: 24px; border-bottom: 1px solid var(--divider); }
  .tab {
    appearance: none; background: 0; border: 0; cursor: pointer; font: inherit;
    color: var(--subtle); font-size: 14.5px; font-weight: 500;
    padding: 12px 2px 14px; position: relative;
  }
  .tab.on { color: var(--ink); font-weight: 600; }
  .tab.on::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: var(--brown); border-radius: 2px 2px 0 0;
  }

  /* —— Bottom action bar —— */
  .actionbar {
    display: flex; gap: 8px; padding: 12px;
    background: var(--surface); border: 1px solid var(--divider); border-radius: var(--r-md);
    box-shadow: var(--shadow-1);
  }
  .actionbar .a {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 6px; border-radius: var(--r-sm);
    color: var(--ink-2); background: transparent;
    font-size: 12px; cursor: pointer; border: 0; font: inherit; font-weight: 500;
  }
  .actionbar .a.primary { background: var(--brown); color: var(--cream); }
  .actionbar .a .ico { width: 20px; height: 20px; }
  .actionbar .a:not(.primary):hover { background: rgba(0,0,0,.04); }
  html[data-theme="dark"] .actionbar .a:not(.primary):hover { background: rgba(255,255,255,.05); }

  /* —— Progress bar —— */
  .progress { height: 3px; background: var(--divider); border-radius: 999px; overflow: hidden; }
  .progress > i { display: block; height: 100%; background: var(--brown); border-radius: 999px; }

  /* —— Typography preview rows —— */
  .type-row {
    display: grid; grid-template-columns: 130px 1fr 220px; gap: 24px;
    padding: 18px 0; border-bottom: 1px dashed var(--hairline);
    align-items: baseline;
  }
  @media (max-width: 720px) {
    .type-row { grid-template-columns: 1fr; gap: 6px; }
  }
  .type-row .role { color: var(--subtle); font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .type-row .spec { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  /* —— Spacing visual —— */
  .sp-row { display: grid; grid-template-columns: 80px 1fr 100px; gap: 18px; align-items: center; padding: 10px 0; }
  .sp-row .name { font-family: var(--font-mono); font-size: 12px; color: var(--subtle); }
  .sp-row .bar { background: var(--brown); height: 14px; border-radius: 3px; opacity: .85; }
  .sp-row .val { font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-align: right; }

  /* —— Radius examples —— */
  .radius-row { display: flex; gap: 18px; flex-wrap: wrap; }
  .radius-row > div { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .radius-row .r-box { width: 96px; height: 72px; background: var(--surface); border: 1px solid var(--divider); }

  /* —— Empty state preview —— */
  .empty-card {
    background: var(--surface); border: 1px dashed var(--hairline); border-radius: var(--r-lg);
    padding: 36px 24px; display: flex; flex-direction: column; align-items: center; gap: 14px;
    text-align: center;
  }
  .empty-illu { color: var(--brown); }

  /* —— Markdown preview (the signature: colored left bar on each bullet) —— */
  .md {
    background: var(--surface); border: 1px solid var(--divider); border-radius: var(--r-md);
    padding: 24px 28px;
  }
  .md h1 { font-family: var(--font-display); font-weight: 800; font-size: 26px; margin: 0 0 4px; color: var(--ink); letter-spacing: -0.015em; }
  .md h2 { font-family: var(--font-display); font-weight: 700; font-size: 18px; margin: 22px 0 8px; color: var(--ink); }
  .md p { color: var(--ink-2); margin: 6px 0; }
  .md ul { list-style: none; padding: 0; margin: 4px 0 8px; }
  .md li { position: relative; padding: 4px 0 4px 14px; color: var(--ink-2); }
  .md li::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px; border-radius: 2px; background: var(--c, var(--divider)); }
  .md li[data-c="yellow"] { --c: var(--hl-yellow); }
  .md li[data-c="orange"] { --c: var(--hl-orange); }
  .md li[data-c="pink"]   { --c: var(--hl-pink); }
  .md li[data-c="blue"]   { --c: var(--hl-blue); }

  /* —— Shadow demo —— */
  .shadow-demo {
    width: 220px; height: 100px; border-radius: var(--r-md);
    background: var(--surface); border: 1px solid var(--divider);
    box-shadow: var(--shadow-1);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--subtle);
  }

  .footnote {
    margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--divider);
    color: var(--muted); font-size: 12px;
  }

  /* —— Layout grids —— */
  .g-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .g-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .g-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 720px) {
    .g-2, .g-3, .g-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 460px) {
    .g-2, .g-3, .g-4 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ds-content.jsx"></script>
<script type="text/babel" src="ds-app.jsx"></script>
</body>
</html>
