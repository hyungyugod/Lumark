<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lumark · Logo & Icon Board</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --brown:    oklch(0.43 0.060 58);
    --brown-2:  oklch(0.32 0.055 55);
    --brown-3:  oklch(0.24 0.045 55);
    --cream:    oklch(0.962 0.018 82);
    --surface:  oklch(0.985 0.010 82);
    --surface-2:oklch(0.945 0.020 82);
    --ink:      oklch(0.255 0.026 50);
    --ink-2:    oklch(0.34 0.022 50);
    --subtle:   oklch(0.555 0.018 52);
    --muted:    oklch(0.72 0.015 60);
    --divider:  oklch(0.895 0.014 70);
    --hairline: oklch(0.84 0.014 65);
    --brass:    oklch(0.70 0.10 78);

    --hl-yellow: oklch(0.80 0.180 90);
    --hl-orange: oklch(0.72 0.180 50);
    --hl-pink:   oklch(0.70 0.175 0);
    --hl-blue:   oklch(0.66 0.130 235);

    --r-sm: 6px;
    --r-md: 12px;
    --r-lg: 20px;

    --font-body: 'Noto Sans KR', system-ui, sans-serif;
    --font-display: 'Nanum Myeongjo', 'Noto Serif KR', serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background:
      radial-gradient(800px 400px at 20% -10%, color-mix(in oklab, var(--brass) 8%, transparent), transparent),
      var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
  }

  /* —— Board shell —— */
  .board {
    max-width: 1280px;
    margin: 0 auto;
    padding: 64px 56px 120px;
  }
  @media (max-width: 760px) { .board { padding: 32px 22px 80px; } }

  .topbar { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .crumb { font-family: var(--font-mono); font-size: 12px; color: var(--muted); letter-spacing: 0.06em; }
  .crumb b { color: var(--brass); font-weight: 600; }

  h1.title {
    font-family: var(--font-display); font-weight: 800; font-size: 44px; line-height: 1.12;
    letter-spacing: -0.022em; color: var(--ink); margin: 4px 0 12px;
  }
  .lede { font-size: 17px; color: var(--ink-2); max-width: 620px; line-height: 1.6; }

  .meta-strip { margin-top: 22px; display: flex; gap: 22px; flex-wrap: wrap; color: var(--subtle); font-size: 12.5px; }
  .meta-strip > span { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .meta-strip .k { font-family: var(--font-mono); color: var(--muted); }

  /* —— Section frame —— */
  section.s {
    margin-top: 64px;
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: var(--r-lg);
    padding: 36px;
    box-shadow: 0 1px 2px rgba(40,28,16,.04), 0 18px 60px -40px rgba(40,28,16,.18);
  }
  @media (max-width: 760px) { section.s { padding: 24px; } }
  .s-head { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 6px; }
  .s-head .left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .s-head .num {
    font-family: var(--font-mono); font-size: 12px; color: var(--brass);
    border: 1px solid var(--brass); padding: 2px 8px; border-radius: 999px;
    background: color-mix(in oklab, var(--brass) 8%, transparent);
  }
  .s-head h2 { font-family: var(--font-display); font-weight: 800; font-size: 26px; margin: 0; letter-spacing: -0.015em; color: var(--ink); }
  .s-desc { color: var(--subtle); max-width: 620px; margin: 8px 0 28px; font-size: 14px; }

  /* —— Wordmark display —— */
  .wordmark-row { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 900px) { .wordmark-row { grid-template-columns: repeat(3, 1fr); } }
  .wm-card {
    border-radius: var(--r-md); border: 1px solid var(--divider);
    padding: 36px 28px 22px; display: flex; flex-direction: column; gap: 14px;
    background: var(--surface);
    overflow: hidden;
    min-height: 180px;
  }
  .wm-card.on-brown { background: var(--brown); border-color: var(--brown-2); }
  .wm-card .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
  .wm-card.on-brown .label { color: color-mix(in oklab, var(--cream) 70%, var(--brown)); }
  .wm-card .stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 18px 0 8px; }

  .wm {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 64px;
    letter-spacing: -0.045em;
    line-height: 1;
    color: var(--ink);
    display: inline-block;
    position: relative;
    white-space: nowrap;
  }
  .wm .wm-letters { position: relative; display: inline-block; }
  /* tiny brass dot above the 'm' (the "mark") */
  .wm .m-dot {
    position: absolute;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--brass);
    /* positioned dynamically per-card via inline style */
  }
  /* k-flourish: a thin angled hairline beneath the k */
  .wm .k-flourish {
    position: absolute;
    height: 2px;
    border-radius: 2px;
    background: var(--brass);
    opacity: 0.85;
  }
  .wm.on-dark { color: var(--cream); }
  .wm.solid .m-dot, .wm.solid .k-flourish { background: currentColor; opacity: 0.85; }

  /* —— Icon directions —— */
  .icon-direction { margin-bottom: 28px; }
  .icon-direction:last-child { margin-bottom: 0; }
  .id-head {
    display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: baseline;
    padding-bottom: 14px; margin-bottom: 22px; border-bottom: 1px dashed var(--hairline);
  }
  @media (max-width: 760px) { .id-head { grid-template-columns: 1fr; gap: 6px; } }
  .id-head .letter { font-family: var(--font-display); font-weight: 800; font-size: 32px; color: var(--brass); letter-spacing: -0.02em; }
  .id-head .right h3 { font-family: var(--font-display); font-weight: 700; font-size: 22px; margin: 0 0 4px; color: var(--ink); }
  .id-head .right p { margin: 0; color: var(--subtle); font-size: 14px; max-width: 580px; }

  .id-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 820px) { .id-grid { grid-template-columns: 1fr; } }

  /* iOS rounded squircle clip approximated with border-radius: 22.4% on rounded rect */
  .ic {
    position: relative;
    border-radius: 22.4%;
    overflow: hidden;
    background: #000;
    box-shadow: 0 2px 4px rgba(40,28,16,.06), 0 14px 40px -16px rgba(40,28,16,.28);
  }
  .ic-1024 { width: 100%; aspect-ratio: 1; max-width: 360px; margin: 0 auto; }
  .ic svg { display: block; width: 100%; height: 100%; }

  .preview-stack {
    display: grid; gap: 14px;
  }
  .preview-card {
    display: grid; grid-template-columns: 60px 1fr; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: var(--r-md); border: 1px solid var(--divider);
  }
  .preview-card.dark { background: #0a0908; border-color: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }
  .preview-card.light { background: #fff; border-color: var(--divider); color: var(--subtle); }
  .preview-card.cream { background: var(--cream); border-color: var(--divider); color: var(--subtle); }
  .preview-card .meta { display: flex; flex-direction: column; gap: 2px; }
  .preview-card .meta .name { font-size: 13px; font-weight: 600; color: inherit; font-family: var(--font-mono); }
  .preview-card .meta .desc { font-size: 11.5px; opacity: 0.75; }
  .preview-card .ic { width: 60px; height: 60px; }

  /* —— Usage card —— */
  .usage-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media (min-width: 920px) {
    .usage-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .u-block {
    border-radius: var(--r-md); border: 1px solid var(--divider);
    padding: 22px 24px; background: var(--surface);
  }
  .u-block h4 { margin: 0 0 14px; font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--ink); letter-spacing: -0.005em; }

  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 12px 6px 10px; border-radius: 999px; font-size: 12.5px; font-weight: 500;
    background: color-mix(in oklab, var(--c) 14%, var(--surface));
    color: var(--ink-2);
    border: 1px solid color-mix(in oklab, var(--c) 40%, transparent);
  }
  .chip .d { width: 9px; height: 9px; border-radius: 50%; background: var(--c); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }

  .dot-stack { display: inline-flex; gap: 4px; }
  .dot-stack i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .md-mini { font-size: 13.5px; }
  .md-mini ul { list-style: none; padding: 0; margin: 0; }
  .md-mini li {
    position: relative; padding: 5px 0 5px 14px;
    color: var(--ink-2);
  }
  .md-mini li::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 2px; border-radius: 2px; background: var(--c, var(--divider));
  }

  .body-emphasis {
    background: linear-gradient(to bottom, transparent 55%, color-mix(in oklab, var(--c) 40%, transparent) 55%, color-mix(in oklab, var(--c) 40%, transparent) 92%, transparent 92%);
    padding: 0 2px;
  }

  .footnote {
    margin-top: 56px; padding-top: 22px; border-top: 1px solid var(--divider);
    color: var(--muted); font-size: 12px;
  }

  /* —— Spec rows —— */
  .spec-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 12px; padding: 6px 0;
    border-bottom: 1px dashed var(--hairline);
  }
  .spec-row:last-child { border-bottom: 0; }
  .spec-row .k { color: var(--subtle); font-size: 12.5px; }
  .spec-row .v { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="logo-icons.jsx"></script>
<script type="text/babel" src="logo-app.jsx"></script>
</body>
</html>
